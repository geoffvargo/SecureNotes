spring:
  application:
    name: "SecureNotes"

  profiles:
    active: "prod"

  jpa:
    hibernate:
      ddl-auto: "update"
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.MySQLDialect"

  security:
    user:
      name: "${SPRING_SECURITY_USER}"
      password: "${SPRING_SECURITY_PASSWORD}"
    oauth2:
      client:
        registration:
          github:
            client-id: "${GITHUB_CLIENT_ID}"
            client-secret: "${GITHUB_CLIENT_SECRET}"
            scope: read:user, user:email
          google:
            client-id: "${GOOGLE_CLIENT_ID}"
            client-secret: "${GOOGLE_CLIENT_SECRET}"


  app:
    jwtSecret: "${SPRING_APP_JWTSECRET}"
    jwtExpirationMs: 172800000

  mail:
    host: "smtp.gmail.com"
    port: 587
    username: "${SPRING_MAIL_USERNAME}"
    password: "${SPRING_MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

frontend:
  url: "http://localhost:3000"

logging:
  level:
    org:
      springframework:
        security: DEBUG
